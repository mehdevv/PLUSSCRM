kind = "web"
previewPath = "/"
title = "SalesCRM Pro"
version = "1.0.0"
id = "artifacts/sales-crm"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23344

[services.development]
run = "pnpm --filter @workspace/sales-crm run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sales-crm", "run", "build" ]
publicDir = "artifacts/sales-crm/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23344"
BASE_PATH = "/"
